<input (input)="applyFilter($event)" placeholder="ابحث بالاسم..." />
<table mat-table [dataSource]="dataSource" matSort>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>الاسم</th>
    <td mat-cell *matCellDef="let instructor">{{ instructor.name }}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>الحالة</th>
    <td mat-cell *matCellDef="let instructor">{{ instructor.status }}</td>
  </ng-container>
   <ng-container matColumnDef="hireDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>التاريخ</th>
    <td mat-cell *matCellDef="let instructor">{{ instructor.hireDate }}</td>
  </ng-container>
   <ng-container matColumnDef="centerId">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>رقم المركز</th>
    <td mat-cell *matCellDef="let instructor">{{ instructor.centerId }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
<mat-paginator [pageSize]="10"></mat-paginator>
