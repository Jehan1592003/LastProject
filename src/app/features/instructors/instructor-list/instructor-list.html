<div class="flex justify-end mb-4">
  <a routerLink="/instructors/add"
     class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors">
    <span>+</span>
    <span>إضافة مدرّس</span>
  </a>
</div>
<div class="bg-white border border-border rounded-xl overflow-hidden shadow-sm">

  <div class="p-4 border-b border-border">
    <input (input)="applyFilter($event)" placeholder="ابحث بالاسم..." 
           class="w-full h-10 px-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" />
  </div>

  <table mat-table [dataSource]="dataSource" matSort class="w-full">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الاسم</th>
      <td mat-cell *matCellDef="let instructor" class="px-6 py-4 text-sm border-t border-border">
        <a [routerLink]="['/instructors', instructor.id]" class="text-primary hover:underline font-medium">
          {{ instructor.name }}
        </a>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الحالة</th>
      <td mat-cell *matCellDef="let instructor" class="px-6 py-4 text-sm border-t border-border">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold"
              [class.bg-success-light]="instructor.status === 'active'"
              [class.text-success-dark]="instructor.status === 'active'"
              [class.bg-error-light]="instructor.status === 'inactive'"
              [class.text-error-dark]="instructor.status === 'inactive'">
          {{ instructor.status === 'active' ? 'نشط' : 'غير نشط' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="hireDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">التاريخ</th>
      <td mat-cell *matCellDef="let instructor" class="px-6 py-4 text-sm text-text-body border-t border-border">{{ instructor.hireDate }}</td>
    </ng-container>

    <ng-container matColumnDef="centerId">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">رقم المركز</th>
      <td mat-cell *matCellDef="let instructor" class="px-6 py-4 text-sm text-text-body border-t border-border">{{ instructor.centerId }}</td>
    </ng-container>

   <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الإجراءات</th>
  <td mat-cell *matCellDef="let instructor" class="px-6 py-4 text-sm border-t border-border">
    <div class="flex gap-2">
      <a [routerLink]="['/instructors', instructor.id]" title="تعديل"
         class="w-9 h-9 flex items-center justify-center rounded-full bg-primary-pale text-primary hover:bg-primary-light transition text-base">
        ✏️
      </a>
      <button type="button" title="حذف (قريباً)" disabled
              class="w-9 h-9 flex items-center justify-center rounded-full bg-error-light text-error-dark opacity-40 cursor-not-allowed text-base">
        🗑️
      </button>
    </div>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-bg-subtle transition-colors duration-200"></tr>

  </table>

  <mat-paginator [pageSize]="10" class="border-t border-border"></mat-paginator>
</div>
