<div class="max-w-2xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">الملف الشخصي</h1>
    <button
      (click)="toggleEdit()"
      class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors">
      {{ isEditing ? 'إلغاء' : 'تعديل' }}
    </button>
  </div>

  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
    @if (!isEditing) {
      <div class="space-y-4">
        <div class="flex justify-between py-3 border-b border-gray-100">
          <span class="text-gray-500 text-sm">الاسم</span>
          <span class="text-gray-900 font-medium">{{ user?.name }}</span>
        </div>
        <div class="flex justify-between py-3 border-b border-gray-100">
          <span class="text-gray-500 text-sm">اسم المستخدم</span>
          <span class="text-gray-900 font-medium">{{ user?.username }}</span>
        </div>
        <div class="flex justify-between py-3 border-b border-gray-100">
          <span class="text-gray-500 text-sm">البريد الإلكتروني</span>
          <span class="text-gray-900 font-medium">{{ user?.email }}</span>
        </div>
        <div class="flex justify-between py-3 border-b border-gray-100">
          <span class="text-gray-500 text-sm">الدور</span>
          <span class="px-2 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">
            {{ user?.role === 'admin' ? 'مدير' : 'مستخدم' }}
          </span>
        </div>
      </div>
    }
    @if (isEditing) {
      <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="space-y-4">
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-1.5">الاسم</label>
          <input
            type="text"
            formControlName="name"
            class="h-10 px-3 rounded-lg border text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
            [ngClass]="profileForm.get('name')?.invalid && profileForm.get('name')?.touched ? 'border-red-600' : 'border-gray-300'"
          />
         <span *ngIf="profileForm.get('name')?.hasError('name') && profileForm.get('name')?.touched" class="text-xs text-red-600 mt-1">
           {{ profileForm.get('name')?.getError('name') }}
        </span>
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-1.5">اسم المستخدم</label>
          <input
            type="text"
            formControlName="username"
            class="h-10 px-3 rounded-lg border text-sm text-gray-900 bg-gray-50"
            readonly
          />
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-1.5">البريد الإلكتروني</label>
          <input
            type="email"
            formControlName="email"
            class="h-10 px-3 rounded-lg border text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-600"
            [ngClass]="profileForm.get('email')?.invalid && profileForm.get('email')?.touched ? 'border-red-600' : 'border-gray-300'"
          />
          <span *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched" class="text-xs text-red-600 mt-1">بريد غير صحيح</span>
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700 mb-1.5">الدور</label>
          <input
            type="text"
            formControlName="role"
            class="h-10 px-3 rounded-lg border text-sm text-gray-900 bg-gray-50"
            readonly
          />
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
          <button
            type="submit"
            [disabled]="profileForm.invalid || isSaving"
            class="h-10 px-4 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center gap-2">
            <mat-spinner *ngIf="isSaving" diameter="16" class="!w-4 !h-4"></mat-spinner>
            <span>{{ isSaving ? 'جاري...' : 'حفظ' }}</span>
          </button>
        </div>
      </form>
    }
  </div>
</div>
