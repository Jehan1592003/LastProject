<input [(ngModel)]="searchName" (ngModelChange)="applyFilters()" placeholder="ابحث بالاسم..." />
<select [(ngModel)]="selectedCenterId" (ngModelChange)="applyFilters()">
  <option value="">كل المراكز</option>
  @for (center of centers; track center.id) {
    <option [value]="center.id">{{ center.name }}</option>
  }
</select>
<table mat-table [dataSource]="dataSource" matSort>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>الاسم</th>
    <td mat-cell *matCellDef="let trainee">{{ trainee.name }}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>الحالة</th>
    <td mat-cell *matCellDef="let trainee">{{ trainee.status }}</td>
  </ng-container>
  <ng-container matColumnDef="enrollDate">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>تاريخ التسجيل</th>
  <td mat-cell *matCellDef="let trainee">{{ trainee.enrollDate }}</td>
  </ng-container>
   <ng-container matColumnDef="centerId">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>رقم المركز</th>
    <td mat-cell *matCellDef="let trainee">{{ trainee.centerId }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
<mat-paginator [pageSize]="10"></mat-paginator>
