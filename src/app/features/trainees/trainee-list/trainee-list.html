<div class="bg-white border border-border rounded-xl overflow-hidden shadow-sm">

  <div class="p-4 border-b border-border flex flex-col sm:flex-row gap-3">
    <input [(ngModel)]="searchName" (ngModelChange)="applyFilters()" placeholder="ابحث بالاسم..." 
           class="flex-1 h-10 px-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" />
    
    <select [(ngModel)]="selectedCenterId" (ngModelChange)="applyFilters()"
            class="h-10 px-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-white">
      <option value="">كل المراكز</option>
      @for (center of centers; track center.id) {
        <option [value]="center.id">{{ center.name }}</option>
      }
    </select>
  </div>

  <table mat-table [dataSource]="dataSource" matSort class="w-full">

   <ng-container matColumnDef="name">
  <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الاسم</th>
  <td mat-cell *matCellDef="let trainee" class="px-6 py-4 text-sm border-t border-border">
    <a [routerLink]="['/trainees', trainee.id]" class="text-primary hover:underline font-medium">
      {{ trainee.name }}
    </a>
  </td>
</ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الحالة</th>
      <td mat-cell *matCellDef="let trainee" class="px-6 py-4 text-sm border-t border-border">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold"
              [class.bg-success-light]="trainee.status === 'passed'"
              [class.text-success-dark]="trainee.status === 'passed'"
              [class.bg-warning-light]="trainee.status === 'enrolled'"
              [class.text-warning-dark]="trainee.status === 'enrolled'"
              [class.bg-error-light]="trainee.status === 'failed'"
              [class.text-error-dark]="trainee.status === 'failed'">
          {{ trainee.status === 'passed' ? 'ناجح' : trainee.status === 'enrolled' ? 'قيد التدريب' : 'راسب' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="enrollDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">تاريخ التسجيل</th>
      <td mat-cell *matCellDef="let trainee" class="px-6 py-4 text-sm text-text-body border-t border-border">{{ trainee.enrollDate }}</td>
    </ng-container>

    <ng-container matColumnDef="centerId">
      <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">رقم المركز</th>
      <td mat-cell *matCellDef="let trainee" class="px-6 py-4 text-sm text-text-body border-t border-border">{{ trainee.centerId }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef class="bg-bg-subtle text-text-muted text-xs font-semibold uppercase px-6 py-3 text-right">الإجراءات</th>
  <td mat-cell *matCellDef="let trainee" class="px-6 py-4 text-sm border-t border-border">
    <div class="flex gap-2">
      <a [routerLink]="['/trainees', trainee.id]" title="تعديل"
         class="w-9 h-9 flex items-center justify-center rounded-full bg-primary-pale text-primary hover:bg-primary-light transition text-base">
        ✏️
      </a>
      <button type="button" title="حذف (قريباً)" disabled
              class="w-9 h-9 flex items-center justify-center rounded-full bg-error-light text-error-dark opacity-40 cursor-not-allowed text-base">
        🗑️
      </button>
    </div>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-bg-subtle transition-colors duration-200"></tr>

  </table>

  <mat-paginator [pageSize]="10" class="border-t border-border"></mat-paginator>
</div>
